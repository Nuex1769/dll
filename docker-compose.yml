services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: dll_postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medusa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存 & 事件队列
  redis:
    image: redis:7-alpine
    container_name: dll_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Medusa 后端 (API + Admin Dashboard)
  medusa:
    build:
      context: ./medusa-nextjs-ecommerce
      dockerfile: Dockerfile
    container_name: dll_medusa
    environment:
      DATABASE_URL: postgresql://medusa:password@postgres:5432/medusa_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:9000,http://localhost:8000
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NODE_ENV: development
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js 店面前端
  storefront:
    build:
      context: ./medusa-nextjs-ecommerce-storefront
      dockerfile: Dockerfile
    container_name: dll_storefront
    environment:
      MEDUSA_BACKEND_URL: http://medusa:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEFAULT_REGION: us
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
      NODE_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      - medusa
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: dll_network
